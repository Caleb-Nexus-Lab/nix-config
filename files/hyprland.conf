# =============================================================================
# hyprland/hyprland.conf
# Config Hyprland — Lenovo Yoga Pro Aura / Pop!_OS 24.04
# Fusion config existante + améliorations
# =============================================================================


# -----------------------------------------------------------------------------
# VARIABLES
# -----------------------------------------------------------------------------
$mainMod = SUPER

# Opacité : active / inactive
$active_opacity   = 0.95
$inactive_opacity = 0.80


# -----------------------------------------------------------------------------
# MONITEURS
# Yoga Pro 7i 14IAH10 (83KF001XFR) : dalle OLED native 3000x1876@120Hz
# scale=1.5 indispensable sur 14.5" HiDPI — sans ça tout est minuscule
# Position écran externe : 3000/1.5 = 2000 (tenir compte du scale principal)
#
# Diagnostic : hyprctl monitors
# Si le rendu est flou, essayer scale=2 ; si trop grand, essayer scale=1.25
# -----------------------------------------------------------------------------
monitor = eDP-1, 3000x1876@120, 0x0, 1.5

# Écran externe — résolution auto, positionné à droite
monitor = HDMI-A-1, preferred@144, 2000x0, 1


# -----------------------------------------------------------------------------
# AUTOSTART
# -----------------------------------------------------------------------------
exec-once = waybar
exec-once = mako
exec-once = hypridle
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Environnement D-Bus / systemd (portails XDG, screen share, etc.)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Polkit — authentification graphique (sudo dans virt-manager, etc.)
exec-once = sleep 1 && /usr/libexec/polkit-gnome-authentication-agent-1

# Applet réseau systray
exec-once = sleep 2 && nm-applet --indicator

# Keyring GNOME (SSH, secrets)
exec-once = /usr/bin/gnome-keyring-daemon --start --components=pkcs11,secrets,ssh

# Fond d'écran — décommenter et adapter selon ta config
# exec-once = ~/.config/hypr/scripts/wallpaper.sh


# -----------------------------------------------------------------------------
# VARIABLES D'ENVIRONNEMENT
# -----------------------------------------------------------------------------
env = QT_QPA_PLATFORMTHEME, qt5ct
env = QT_QPA_PLATFORMTHEME, qt6ct

# Curseur (Sweet-cursors, cohérent avec candy-icons)
env = XCURSOR_THEME, Sweet-cursors
env = XCURSOR_SIZE,  24

# Scaling HiDPI — avec scale=1.5 sur eDP-1, GDK_SCALE=1 donne le meilleur rendu
env = GDK_SCALE, 1
env = QT_SCALE_FACTOR, 1


# -----------------------------------------------------------------------------
# INPUT
# -----------------------------------------------------------------------------
input {
    kb_layout = fr
    kb_variant =
    kb_model   =
    kb_options =
    kb_rules   =

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll       = true
        disable_while_typing = true
        tap-to-click         = false     # désactivé — intentionnel
        clickfinger_behavior = true      # 2 doigts = clic droit
        scroll_factor        = 0.8
    }
}


# -----------------------------------------------------------------------------
# GÉNÉRAL
# -----------------------------------------------------------------------------
general {
    gaps_in  = 5
    gaps_out = 10
    border_size = 2

    col.active_border   = rgba(cba6f7ee) rgba(7aa2f7ee) 45deg
    col.inactive_border = rgba(45475a77)

    layout           = dwindle
    resize_on_border = true
    allow_tearing    = false
}


# -----------------------------------------------------------------------------
# DÉCORATIONS
# -----------------------------------------------------------------------------
decoration {
    rounding = 8

    blur {
        enabled           = true
        size              = 5
        passes            = 2
        new_optimizations = true
    }

    shadow {
        enabled      = true
        range        = 10
        render_power = 3
        color        = rgba(1a1a1aee)
    }

    active_opacity     = $active_opacity
    inactive_opacity   = $inactive_opacity
    fullscreen_opacity = 1.0
}


# -----------------------------------------------------------------------------
# ANIMATIONS
# -----------------------------------------------------------------------------
animations {
    enabled = true

    bezier = smoothOut,  0.36, 0.64, 0.45, 0.94
    bezier = overshot,   0.13, 0.99, 0.29, 1.10
    bezier = linear,     0.00, 0.00, 1.00, 1.00

    animation = windows,     1, 4, overshot,  slide
    animation = windowsIn,   1, 5, smoothOut, slide-down
    animation = windowsOut,  1, 5, smoothOut, slide-up
    animation = fadeIn,      1, 3, default
    animation = fadeOut,     1, 3, default
    animation = border,      1, 8, linear
    animation = borderangle, 1, 50, linear, loop
    animation = workspaces,  1, 5, smoothOut, slidevert
}


# -----------------------------------------------------------------------------
# LAYOUT DWINDLE
# -----------------------------------------------------------------------------
dwindle {
    pseudotile     = true
    preserve_split = true
    smart_resizing = true
}

master {
    new_status = slave
    mfact      = 0.55
}


# -----------------------------------------------------------------------------
# GESTES TRACKPAD
# 4 doigts pour éviter les faux positifs en usage quotidien
# -----------------------------------------------------------------------------
gestures {
    workspace_swipe            = true
    workspace_swipe_fingers    = 4
    workspace_swipe_distance   = 300
    workspace_swipe_invert     = true
    workspace_swipe_create_new = true
    workspace_swipe_cancel_ratio = 0.2
}


# -----------------------------------------------------------------------------
# DIVERS
# -----------------------------------------------------------------------------
misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
    animate_manual_resizes   = true
    enable_swallow           = true
    swallow_regex            = ^(kitty|Tabby)$
    focus_on_activate        = false
}


# -----------------------------------------------------------------------------
# RÈGLES DE FENÊTRES
# Diagnostic : hyprctl clients  (classe et titre de chaque fenêtre ouverte)
# -----------------------------------------------------------------------------

# Opacité globale (toutes les fenêtres)
windowrule = opacity $active_opacity $inactive_opacity, .*

# Flottants systèmes
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(org.gnome.Calculator)$

# Wireshark — flottant centré
windowrulev2 = float,  class:^(wireshark)$
windowrulev2 = size 1400 900, class:^(wireshark)$
windowrulev2 = center, class:^(wireshark)$

# virt-manager — flottant centré (géré par apt, pas Nix)
windowrulev2 = float,  class:^(virt-manager)$
windowrulev2 = size 1200 800, class:^(virt-manager)$
windowrulev2 = center, class:^(virt-manager)$

# Dialogues fichiers / confirmation
windowrulev2 = float, title:^(Open File)(.*)$
windowrulev2 = float, title:^(Save File)(.*)$
windowrulev2 = float, title:^(Confirm)(.*)$
windowrulev2 = float, title:^(File Operation Progress)(.*)$

# PiP vidéo — flottant, épinglé au-dessus de tout
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin,   title:^(Picture-in-Picture)$

# Kitty — transparence dédiée (override de la règle globale)
windowrulev2 = opacity 0.95 0.85, class:^(kitty)$


# =============================================================================
# RACCOURCIS CLAVIER
# =============================================================================

# -----------------------------------------------------------------------------
# APPLICATIONS
# -----------------------------------------------------------------------------
bind = $mainMod,       Return, exec, kitty
bind = $mainMod SHIFT, Return, exec, tabby
bind = $mainMod,       Space,  exec, wofi --show drun
bind = $mainMod,       Escape, exec, hyprlock
bind = $mainMod,       F,      exec, nautilus
bind = $mainMod,       T,      exec, gnome-text-editor

# Historique clipboard (wofi — natif Wayland)
bind = $mainMod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Screenshots
bind = ,               Print,  exec, ~/.config/hypr/scripts/screenshot.sh
bind = SHIFT,          Print,  exec, grim ~/Images/$(date '+%Y%m%d_%H%M%S').png
bind = $mainMod,       Print,  exec, grim -g "$(slurp)" - | wl-copy


# -----------------------------------------------------------------------------
# GESTION DE FENÊTRES
# -----------------------------------------------------------------------------
bind = $mainMod,       Q, killactive
bind = $mainMod,       M, exit

bind = $mainMod,       G,      fullscreen, 0          # plein écran
bind = $mainMod SHIFT, G,      fullscreen, 1          # maximiser (sans fullscreen)
bind = $mainMod,       W,      togglefloating
bind = $mainMod,       P,      pseudo                 # dwindle pseudo-tile
bind = $mainMod,       J,      togglesplit            # changer direction split


# -----------------------------------------------------------------------------
# FOCUS — flèches directionnelles
# -----------------------------------------------------------------------------
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d


# -----------------------------------------------------------------------------
# DÉPLACEMENT DE FENÊTRES
# -----------------------------------------------------------------------------
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Swap (Alt = échanger avec le voisin sans toucher au layout)
bind = $mainMod ALT, left,  swapwindow, l
bind = $mainMod ALT, right, swapwindow, r
bind = $mainMod ALT, up,    swapwindow, u
bind = $mainMod ALT, down,  swapwindow, d

# Multi-écrans — déplacer la fenêtre active vers l'autre moniteur
bind = $mainMod, Page_Up,   movewindow, mon:l
bind = $mainMod, Page_Down, movewindow, mon:r


# -----------------------------------------------------------------------------
# REDIMENSIONNEMENT
# -----------------------------------------------------------------------------
binde = $mainMod CTRL, left,  resizeactive, -40 0
binde = $mainMod CTRL, right, resizeactive,  40 0
binde = $mainMod CTRL, up,    resizeactive, 0 -40
binde = $mainMod CTRL, down,  resizeactive, 0  40


# -----------------------------------------------------------------------------
# WORKSPACES — AZERTY
# Les touches correspondent aux caractères sans Shift sur clavier FR
# -----------------------------------------------------------------------------

# Naviguer vers un workspace
bind = $mainMod, ampersand,  workspace, 1
bind = $mainMod, eacute,     workspace, 2
bind = $mainMod, quotedbl,   workspace, 3
bind = $mainMod, apostrophe, workspace, 4
bind = $mainMod, parenleft,  workspace, 5
bind = $mainMod, minus,      workspace, 6
bind = $mainMod, egrave,     workspace, 7
bind = $mainMod, underscore, workspace, 8
bind = $mainMod, ccedilla,   workspace, 9
bind = $mainMod, agrave,     workspace, 10

# Déplacer une fenêtre vers un workspace
bind = $mainMod SHIFT, ampersand,  movetoworkspace, 1
bind = $mainMod SHIFT, eacute,     movetoworkspace, 2
bind = $mainMod SHIFT, quotedbl,   movetoworkspace, 3
bind = $mainMod SHIFT, apostrophe, movetoworkspace, 4
bind = $mainMod SHIFT, parenleft,  movetoworkspace, 5
bind = $mainMod SHIFT, minus,      movetoworkspace, 6
bind = $mainMod SHIFT, egrave,     movetoworkspace, 7
bind = $mainMod SHIFT, underscore, movetoworkspace, 8
bind = $mainMod SHIFT, ccedilla,   movetoworkspace, 9
bind = $mainMod SHIFT, agrave,     movetoworkspace, 10

# Navigation workspace — molette souris (résout le conflit flèches haut/bas)
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Workspace spécial / scratchpad
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic


# -----------------------------------------------------------------------------
# SOURIS — fenêtres flottantes
# -----------------------------------------------------------------------------
bindm = $mainMod, mouse:272, movewindow    # Super + clic gauche = déplacer
bindm = $mainMod, mouse:273, resizewindow  # Super + clic droit  = redimensionner


# -----------------------------------------------------------------------------
# MÉDIAS / SYSTÈME
# -----------------------------------------------------------------------------
binde = , XF86AudioRaiseVolume,  exec, pamixer -i 5
binde = , XF86AudioLowerVolume,  exec, pamixer -d 5
bind  = , XF86AudioMute,         exec, pamixer -t
bind  = , XF86AudioMicMute,      exec, pamixer --default-source -t

binde = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

bind  = , XF86AudioPlay,  exec, playerctl play-pause
bind  = , XF86AudioNext,  exec, playerctl next
bind  = , XF86AudioPrev,  exec, playerctl previous
