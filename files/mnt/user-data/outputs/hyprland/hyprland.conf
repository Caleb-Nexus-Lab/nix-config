# =============================================================================
# modules/hyprland/hyprland.conf
#
# Configuration native Hyprland — lue par `builtins.readFile` depuis default.nix
# et placée verbatim dans ~/.config/hypr/hyprland.conf
#
# Doc de référence : https://wiki.hyprland.org/Configuring/
# Commandes utiles :
#   hyprctl monitors            → noms des sorties vidéo
#   hyprctl clients             → classe/titre des fenêtres ouvertes
#   hyprctl dispatch ...        → exécuter une action Hyprland manuellement
# =============================================================================


# =============================================================================
# MONITEURS
# Syntaxe : monitor=NOM,RÉSOLUTIONxHAUTEUR@REFRESH,POSITION,ÉCHELLE
# `preferred` = meilleure résolution détectée automatiquement
# `auto`      = position automatique (évite les chevauchements)
# =============================================================================
monitor = , preferred, auto, 1

# Exemples multi-écrans — décommenter et adapter selon `hyprctl monitors` :
# monitor = DP-1,   2560x1440@144, 0x0,    1
# monitor = HDMI-A-1, 1920x1080@60, 2560x0, 1


# =============================================================================
# AUTOSTART
# Les services déclarés dans systemd (polkit, waybar, mako) démarrent via
# systemd. On autostart ici les programmes sans unit dédiée.
# =============================================================================
exec-once = hyprpaper                                            # fond d'écran
exec-once = wl-paste --type text  --watch cliphist store        # clipboard texte → historique
exec-once = wl-paste --type image --watch cliphist store        # clipboard image → historique


# =============================================================================
# VARIABLES D'ENVIRONNEMENT (scope session Hyprland, complémentaires à home.nix)
# =============================================================================
env = XCURSOR_THEME, Sweet-cursors
env = XCURSOR_SIZE,  24


# =============================================================================
# APPARENCE GÉNÉRALE
# =============================================================================
general {
    # Espacement entre les fenêtres et le bord d'écran
    gaps_in  = 5
    gaps_out = 12

    # Bordures
    border_size = 2

    # Couleur de la bordure active : dégradé animé (bleu → violet)
    col.active_border   = rgba(7aa2f7ff) rgba(bb9af7ff) 45deg
    # Couleur de la bordure inactive : gris discret
    col.inactive_border = rgba(414868aa)

    # Layout par défaut au lancement
    layout = dwindle

    # Permettre de redimensionner en tirant les bordures à la souris
    resize_on_border = true

    # Désactiver le tearing (laisser false sauf besoin explicite jeux)
    allow_tearing = false
}


# =============================================================================
# DÉCORATION (arrondi, flou, ombres, opacité)
# =============================================================================
decoration {
    # Arrondi des coins (pixels)
    rounding = 8

    # Opacité des fenêtres (1.0 = opaque)
    active_opacity   = 1.0
    inactive_opacity = 0.93
    fullscreen_opacity = 1.0

    # Flou de l'arrière-plan (visible derrière fenêtres transparentes)
    blur {
        enabled           = true
        size              = 5
        passes            = 3
        new_optimizations = true
        xray              = false   # false = le flou s'applique sous toutes fenêtres
    }

    # Ombre portée
    shadow {
        enabled      = true
        range        = 12
        render_power = 3
        color        = rgba(1a1a2ecc)
    }
}


# =============================================================================
# ANIMATIONS
# Courbes de Bézier personnalisées, puis règles d'animation.
# `1` = activé, `0` = désactivé. Paramètres : durée (frames @60Hz), courbe, style.
# =============================================================================
animations {
    enabled = true

    # Courbes
    bezier = overshot,   0.13, 0.99, 0.29, 1.10   # léger dépassement, fluide
    bezier = smoothOut,  0.06, 0.90, 0.19, 1.00
    bezier = smoothIn,   0.25, 1.00, 0.50, 1.00
    bezier = linear,     0.00, 0.00, 1.00, 1.00

    # Fenêtres
    animation = windows,     1, 4, overshot,  slide
    animation = windowsOut,  1, 4, smoothOut, slide
    animation = windowsMove, 1, 4, smoothIn

    # Bordures
    animation = border,      1, 5,  linear
    animation = borderangle, 1, 60, linear, loop   # rotation couleur bordure active

    # Fondu
    animation = fade,        1, 5,  smoothIn

    # Workspaces
    animation = workspaces,  1, 4,  overshot, slide
}


# =============================================================================
# LAYOUT DWINDLE (tiling en spirale — défaut)
# =============================================================================
dwindle {
    pseudotile     = true    # garde la fenêtre flottante dans son slot tiling
    preserve_split = true    # la direction du split est mémorisée
    smart_split    = false
    smart_resizing = true
}


# =============================================================================
# LAYOUT MASTER (maître + esclaves)
# Activer avec : hyprctl dispatch layoutmsg, orientation left
# =============================================================================
master {
    new_status = slave     # nouvelles fenêtres = esclaves (pas maître)
    mfact      = 0.55      # proportion du maître (55 %)
}


# =============================================================================
# INPUT (clavier, souris, touchpad)
# =============================================================================
input {
    # Disposition clavier — fr AZERTY
    kb_layout  = fr
    kb_variant =
    kb_options = caps:escape    # CapsLock → Escape (indispensable sous Neovim)

    # Comportement du focus souris (1 = focus suit le curseur, pas de clic requis)
    follow_mouse = 1
    sensitivity  = 0            # 0 = aucune modification d'accélération

    touchpad {
        natural_scroll       = true
        tap-to-click         = true
        disable_while_typing = true
        scroll_factor        = 0.8
    }
}


# =============================================================================
# GESTES TOUCHPAD
# =============================================================================
gestures {
    workspace_swipe          = true
    workspace_swipe_fingers  = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert   = true
    workspace_swipe_cancel_ratio = 0.2
}


# =============================================================================
# DIVERS
# =============================================================================
misc {
    disable_hyprland_logo    = true    # pas de logo au démarrage
    disable_splash_rendering = true
    mouse_move_enables_dpms  = true    # mouvement souris = réveille les écrans
    key_press_enables_dpms   = true    # touche clavier = réveille les écrans
    animate_manual_resizes   = true

    # "Avaler" le terminal qui a lancé une app graphique
    # → le terminal disparaît proprement une fois l'app ouverte
    enable_swallow  = true
    swallow_regex   = ^(kitty|Tabby)$  # adapter si ton binaire Tabby a un autre nom

    focus_on_activate = false          # empêche le vol de focus automatique
}


# =============================================================================
# RÈGLES DE FENÊTRES (windowrulev2)
# Syntaxe : windowrulev2 = RÈGLE, FILTRE
# `hyprctl clients` pour connaître class/title des fenêtres ouvertes
# =============================================================================

# -- virt-manager (géré par apt, pas Nix) ------------------------------------
windowrulev2 = float,           class:^(virt-manager)$
windowrulev2 = size 1200 820,   class:^(virt-manager)$
windowrulev2 = center,          class:^(virt-manager)$

# -- Wireshark ---------------------------------------------------------------
windowrulev2 = float,           class:^(wireshark)$
windowrulev2 = size 1400 900,   class:^(wireshark)$
windowrulev2 = center,          class:^(wireshark)$

# -- Kitty (terminal backup) — légère transparence inactive ------------------
windowrulev2 = opacity 1.0 0.92, class:^(kitty)$

# -- Contrôle volume ---------------------------------------------------------
windowrulev2 = float,           class:^(pavucontrol)$
windowrulev2 = size 700 450,    class:^(pavucontrol)$
windowrulev2 = center,          class:^(pavucontrol)$

# -- Bluetooth ---------------------------------------------------------------
windowrulev2 = float,           class:^(blueman-manager)$

# -- Dialogues système (file picker, progression, etc.) ---------------------
windowrulev2 = float,  title:^(Open File)(.*)$
windowrulev2 = float,  title:^(Save File)(.*)$
windowrulev2 = float,  title:^(File Operation Progress)(.*)$
windowrulev2 = float,  title:^(Confirm)(.*)$
windowrulev2 = float,  class:^(xdg-desktop-portal-gtk)$

# -- Picture-in-Picture -------------------------------------------------------
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin,   title:^(Picture-in-Picture)$


# =============================================================================
# KEYBINDINGS
# $mainMod = touche Super (touche Windows)
# Doc : https://wiki.hyprland.org/Configuring/Binds/
# =============================================================================
$mainMod = SUPER

# -----------------------------------------------------------------------------
# Applications
# -----------------------------------------------------------------------------
bind = $mainMod,        Return,      exec, kitty                       # terminal backup
bind = $mainMod SHIFT,  Return,      exec, tabby                       # Tabby (terminal principal)
bind = $mainMod,        Space,       exec, wofi --show drun             # launcher
bind = $mainMod,        E,           exec, nautilus                     # explorateur fichiers
bind = $mainMod,        V,           exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy  # clipboard history

# Screenshots (grim + slurp)
bind = ,        Print,  exec, grim -g "$(slurp)" - | wl-copy                          # zone → clipboard
bind = SHIFT,   Print,  exec, grim "$HOME/Images/$(date '+%Y%m%d_%H%M%S').png"        # plein écran → fichier
bind = $mainMod, Print, exec, grim -g "$(hyprctl activewindow -j | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" - | wl-copy  # fenêtre active → clipboard

# Verrouillage
bind = $mainMod, L, exec, hyprlock

# -----------------------------------------------------------------------------
# Gestion des fenêtres
# -----------------------------------------------------------------------------
bind = $mainMod,        Q,  killactive               # fermer la fenêtre active
bind = $mainMod SHIFT,  Q,  exit                     # quitter Hyprland
bind = $mainMod,        F,  fullscreen, 0             # plein écran réel
bind = $mainMod SHIFT,  F,  fullscreen, 1             # maximiser (garde les décors)
bind = $mainMod,        T,  togglefloating            # basculer flottant ↔ tiling
bind = $mainMod,        P,  pseudo                    # dwindle pseudo-tile
bind = $mainMod,        J,  togglesplit               # inverser direction split dwindle

# Focus — navigation HJKL (Vim)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Déplacement fenêtres — HJKL + Shift
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Redimensionnement — HJKL + Ctrl (binde = répétition maintien touche)
binde = $mainMod CTRL, H, resizeactive, -40  0
binde = $mainMod CTRL, L, resizeactive,  40  0
binde = $mainMod CTRL, K, resizeactive,   0 -40
binde = $mainMod CTRL, J, resizeactive,   0  40

# Souris : déplacer / redimensionner les fenêtres flottantes
bindm = $mainMod, mouse:272, movewindow     # Super + clic gauche → déplacer
bindm = $mainMod, mouse:273, resizewindow   # Super + clic droit  → redimensionner

# -----------------------------------------------------------------------------
# Workspaces 1–10
# -----------------------------------------------------------------------------
bind = $mainMod,       1, workspace, 1
bind = $mainMod,       2, workspace, 2
bind = $mainMod,       3, workspace, 3
bind = $mainMod,       4, workspace, 4
bind = $mainMod,       5, workspace, 5
bind = $mainMod,       6, workspace, 6
bind = $mainMod,       7, workspace, 7
bind = $mainMod,       8, workspace, 8
bind = $mainMod,       9, workspace, 9
bind = $mainMod,       0, workspace, 10

# Envoyer la fenêtre active vers un workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Navigation workspace suivant / précédent
bind = $mainMod,       Tab,       workspace, e+1
bind = $mainMod SHIFT, Tab,       workspace, e-1
bind = $mainMod,       mouse_down, workspace, e+1
bind = $mainMod,       mouse_up,   workspace, e-1

# Workspace spécial (scratchpad — masqué par défaut)
bind = $mainMod,       S, togglespecialworkspace, scratchpad
bind = $mainMod SHIFT, S, movetoworkspace,        special:scratchpad

# -----------------------------------------------------------------------------
# Médias & système (touches spéciales clavier)
# -----------------------------------------------------------------------------
# Volume
binde = , XF86AudioRaiseVolume,  exec, pamixer -i 5
binde = , XF86AudioLowerVolume,  exec, pamixer -d 5
bind  = , XF86AudioMute,         exec, pamixer -t
bind  = , XF86AudioMicMute,      exec, pamixer --default-source -t

# Luminosité
binde = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Contrôle lecture
bind = , XF86AudioPlay,  exec, playerctl play-pause
bind = , XF86AudioNext,  exec, playerctl next
bind = , XF86AudioPrev,  exec, playerctl previous
